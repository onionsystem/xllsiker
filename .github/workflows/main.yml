  # ══════════════════════════════════════════════════════════════
  # ZSUB FILLER — MMS forced alignment (dolgu sesi motoru)
  # ══════════════════════════════════════════════════════════════

  filler-win-cuda:
    name: Filler · Windows CUDA
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu128
          pip install transformers>=4.40.0 accelerate safetensors
          pip install pyinstaller>=6.0

      - name: Build
        run: |
          pyinstaller zsub_filler.py `
            --onedir `
            --name zsub-filler `
            --collect-all torch `
            --collect-all torchaudio `
            --collect-all transformers `
            --collect-all tokenizers `
            --collect-all huggingface_hub `
            --collect-all safetensors `
            --hidden-import=torchaudio.functional `
            --hidden-import=torchaudio.transforms `
            --hidden-import=torchaudio.backend.soundfile_backend `
            --hidden-import=transformers.models.wav2vec2 `
            --hidden-import=transformers.models.wav2vec2.modeling_wav2vec2 `
            --hidden-import=transformers.models.wav2vec2.processing_wav2vec2 `
            --hidden-import=transformers.models.wav2vec2.feature_extraction_wav2vec2 `
            --hidden-import=transformers.models.wav2vec2.tokenization_wav2vec2 `
            --noconfirm `
            --distpath dist\win\cuda

