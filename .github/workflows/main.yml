        with:
          name: zsub-engine-win-cpu
          path: dist\win\cpu\zsub-engine-cpu\
          retention-days: 7

  # ──────────────────────────────────────────────────────────────

  engine-mac-arm64:
    name: Engine · macOS ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
