name: ZSub Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════════════════════════
  # ZSUB ENGINE — faster-whisper (altyazi motoru)
  # ══════════════════════════════════════════════════════════════

  engine-win-cuda:
    name: Engine · Windows CUDA
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu128
          pip install ctranslate2 faster-whisper
          pip install pyinstaller>=6.0

      - name: Build
        run: |
          pyinstaller faster_whisper_cli.py `
            --onedir `
            --name zsub-engine `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all tokenizers `
            --collect-all torch `
            --hidden-import=torch `
            --hidden-import=torch.cuda `
            --noconfirm `
            --distpath dist\win\cuda

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zsub-engine-win-cuda
          path: dist\win\cuda\zsub-engine\
          retention-days: 7

  # ──────────────────────────────────────────────────────────────

  engine-win-cpu:
    name: Engine · Windows CPU
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
