name: ZSub Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════════════════════════
  # ZSUB ENGINE — faster-whisper (altyazi motoru)
  # ══════════════════════════════════════════════════════════════

  engine-win-cuda:
    name: Engine · Windows CUDA
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu128
          pip install ctranslate2 faster-whisper
          pip install pyinstaller>=6.0

      - name: Gereksiz torch dosyalarini sil
        run: |
          python -c "
          import os, shutil, glob, sys
          site = next(p for p in sys.path if 'site-packages' in p)
          torch_dir = os.path.join(site, 'torch')
          targets = [
              os.path.join(torch_dir, 'test'),
              os.path.join(torch_dir, 'share', 'cmake'),
              os.path.join(torch_dir, 'include'),
          ]
          for lib in glob.glob(os.path.join(torch_dir, 'lib', '*xpu*')): targets.append(lib)
          for lib in glob.glob(os.path.join(torch_dir, 'lib', '*rocm*')): targets.append(lib)
          for lib in glob.glob(os.path.join(torch_dir, 'lib', '*hip*')): targets.append(lib)
          total = 0
          for p in targets:
              if os.path.exists(p):
                  size = sum(os.path.getsize(f) for f in glob.glob(p+'/**', recursive=True) if os.path.isfile(f))
                  total += size
                  shutil.rmtree(p, ignore_errors=True) if os.path.isdir(p) else os.remove(p)
          print(f'Silindi: {total/1024/1024:.0f} MB')
          "

      - name: Build
        run: |
          pyinstaller faster_whisper_cli.py `
            --onedir `
            --name zsub-engine `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all tokenizers `
            --collect-submodules torch `
            --hidden-import=torch `
            --hidden-import=torch.cuda `
            --exclude-module=torch.distributed `
            --exclude-module=torch.fx `
            --exclude-module=torch.onnx `
            --exclude-module=torch.ao `
            --exclude-module=torch.testing `
            --exclude-module=torchvision `
            --exclude-module=torchaudio `
            --noconfirm `
            --distpath dist\win\cuda

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zsub-engine-win-cuda
          path: dist\win\cuda\zsub-engine\
          retention-days: 7

  # ──────────────────────────────────────────────────────────────

