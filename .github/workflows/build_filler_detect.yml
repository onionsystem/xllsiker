name: Build ZSub Filler Engine MMS_FA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'zsub_filler.py'
      - '.github/workflows/build_filler_detect.yml'

env:
  TOOL_VERSION: "3.1.0"

jobs:
  build-win:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "setuptools<82"
          python -m pip install numpy==1.26.4 torch==2.8.0 torchaudio==2.8.0 uroman==1.3.1.1
          python -m pip install pyinstaller==6.11.1
        shell: pwsh

      - name: Warm MMS_FA cache
        run: |
          New-Item -ItemType Directory -Force -Path .torch-cache\hub\checkpoints | Out-Null
          python -c "import os, torch; torch.hub.set_dir(os.path.abspath('.torch-cache')); from torchaudio.pipelines import MMS_FA as b; b.get_model(with_star=False, dl_kwargs={'model_dir': os.path.abspath('.torch-cache/hub/checkpoints')}); print('MMS_FA cached')"
        shell: pwsh

      - name: Verify imports
        run: |
          python -c "import numpy, torch, torchaudio, uroman; print('numpy:', numpy.__version__); print('torch:', torch.__version__); print('torchaudio:', torchaudio.__version__); print('uroman ok')"
        shell: pwsh

      - name: Build
        run: |
          pyinstaller --clean --noconfirm --onedir --name zsub-filler `
            --collect-all uroman `
            --collect-all numpy `
            --collect-submodules torchaudio `
            --collect-submodules torch `
            --hidden-import regex `
            --hidden-import numpy `
            --add-data ".torch-cache;.torch-cache" `
            zsub_filler.py
        shell: pwsh

      - name: Smoke test
        run: |
          if (!(Test-Path "dist\zsub-filler\zsub-filler.exe")) { throw "binary yok" }
          & "dist\zsub-filler\zsub-filler.exe" --help | Out-Null
        shell: pwsh

      - uses: actions/upload-artifact@v5
        with:
          name: zsub-filler-v${{ env.TOOL_VERSION }}-win-x64
          path: dist/zsub-filler/
          retention-days: 30

  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "setuptools<82"
          python -m pip install numpy==1.26.4 torch==2.8.0 torchaudio==2.8.0 uroman==1.3.1.1
          python -m pip install pyinstaller==6.11.1

      - name: Warm MMS_FA cache
        run: |
          mkdir -p .torch-cache/hub/checkpoints
          python -c "import os, torch; torch.hub.set_dir(os.path.abspath('.torch-cache')); from torchaudio.pipelines import MMS_FA as b; b.get_model(with_star=False, dl_kwargs={'model_dir': os.path.abspath('.torch-cache/hub/checkpoints')}); print('MMS_FA cached')"

      - name: Verify imports
        run: |
          python -c "import numpy, torch, torchaudio, uroman, platform; print('numpy:', numpy.__version__); print('torch:', torch.__version__); print('torchaudio:', torchaudio.__version__); print('machine:', platform.machine())"

      - name: Build
        run: |
          pyinstaller --clean --noconfirm --onedir --name zsub-filler-mac-arm64 \
            --collect-all uroman \
            --collect-all numpy \
            --collect-submodules torchaudio \
            --collect-submodules torch \
            --hidden-import regex \
            --hidden-import numpy \
            --add-data ".torch-cache:.torch-cache" \
            zsub_filler.py

      - name: Smoke test
        run: |
          test -f "dist/zsub-filler-mac-arm64/zsub-filler-mac-arm64"
          chmod +x "dist/zsub-filler-mac-arm64/zsub-filler-mac-arm64"
          "dist/zsub-filler-mac-arm64/zsub-filler-mac-arm64" --help >/dev/null

      - uses: actions/upload-artifact@v5
        with:
          name: zsub-filler-v${{ env.TOOL_VERSION }}-mac-arm64
          path: dist/zsub-filler-mac-arm64/
          retention-days: 30

  build-mac-intel:
    name: macOS Intel x64
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "setuptools<82"
          python -m pip install numpy==1.26.4 torch==2.2.2 torchaudio==2.2.2 uroman==1.3.1.1
          python -m pip install pyinstaller==6.11.1

      - name: Warm MMS_FA cache
        run: |
          mkdir -p .torch-cache/hub/checkpoints
          python -c "import os, torch; torch.hub.set_dir(os.path.abspath('.torch-cache')); from torchaudio.pipelines import MMS_FA as b; b.get_model(with_star=False, dl_kwargs={'model_dir': os.path.abspath('.torch-cache/hub/checkpoints')}); print('MMS_FA cached')"

      - name: Verify imports
        run: |
          python -c "import numpy, torch, torchaudio, uroman, platform; print('numpy:', numpy.__version__); print('torch:', torch.__version__); print('torchaudio:', torchaudio.__version__); print('machine:', platform.machine())"

      - name: Build
        run: |
          pyinstaller --clean --noconfirm --onedir --name zsub-filler-mac-intel \
            --collect-all uroman \
            --collect-all numpy \
            --collect-submodules torchaudio \
            --collect-submodules torch \
            --hidden-import regex \
            --hidden-import numpy \
            --add-data ".torch-cache:.torch-cache" \
            zsub_filler.py

      - name: Smoke test
        run: |
          test -f "dist/zsub-filler-mac-intel/zsub-filler-mac-intel"
          chmod +x "dist/zsub-filler-mac-intel/zsub-filler-mac-intel"
          "dist/zsub-filler-mac-intel/zsub-filler-mac-intel" --help >/dev/null

      - uses: actions/upload-artifact@v5
        with:
          name: zsub-filler-v${{ env.TOOL_VERSION }}-mac-intel-x64
          path: dist/zsub-filler-mac-intel/
          retention-days: 30
